version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # React 與 react-dom 必須相同版本，群組成單一 PR 避免 dependabot 拆開拆斷
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
    # 框架核心 / 編譯器：忽略 major bump，需要手動評估升級
    ignore:
      - dependency-name: next
        update-types:
          - version-update:semver-major
      - dependency-name: eslint-config-next
        update-types:
          - version-update:semver-major
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      - dependency-name: react
        update-types:
          - version-update:semver-major
      - dependency-name: react-dom
        update-types:
          - version-update:semver-major

# legacy/WebApp 為已停用的 Vue 3 prototype（保留 git 歷史，但不再維護依賴）。
# Dependabot 只掃 root package.json，不會自動掃子資料夾，所以無需顯式排除；
# 此處不為 legacy/ 加 entry 即等同排除。
